<!DOCTYPE html>
<html>
<head>
  <title>Aviation Risk Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>✈️ Aviation Near-Miss Detection Dashboard</h1>

<div class="card">
  <h2>📊 Model Performance</h2>
  <p>Accuracy: <span id="accuracy"></span></p>
  <p>Precision: <span id="precision"></span></p>
  <p>Recall: <span id="recall"></span></p>
  <p>F1 Score: <span id="f1"></span></p>
</div>

<div class="card">
  <h2>📉 Confusion Matrix</h2>
  <table id="cm">
    <tr>
      <th></th><th>Predicted Safe</th><th>Predicted Risk</th>
    </tr>
    <tr>
      <th>Actual Safe</th>
      <td id="cm00"></td>
      <td id="cm01"></td>
    </tr>
    <tr>
      <th>Actual Risk</th>
      <td id="cm10"></td>
      <td id="cm11"></td>
    </tr>
  </table>
</div>

<div class="card">
  <h2>⚠️ Risk Summary</h2>
  <p>Total Cases: <span id="total"></span></p>
  <p>Conflicts Detected: <span id="conflicts"></span></p>
  <p>Safe Cases: <span id="safe"></span></p>
</div>

<div class="card">
  <h2>🚨 Sample Risk Pairs</h2>
  <ul id="risks"></ul>
</div>

<div class="card insight">
  <h2>🧠 Insight</h2>
  <p id="insightText"></p>
</div>

<script src="script.js"></script>

</body>
</html>
